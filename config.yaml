github:
  owner: ''
  repo: daily-paper-reader
arxiv_paper_setting:
  mode: standard
  days_window: 9
  docs_dir: docs
  prefer_supabase_read: true
supabase:
  enabled: true
  url: https://lyucdwgefyfbmaiopjbk.supabase.co
  anon_key: sb_publishable_lX-oi64Uxyd7SIVv3_w2Uw_MTOojeKq
  papers_table: arxiv_papers
  use_vector_rpc: true
  vector_rpc: match_arxiv_papers
  vector_rpc_ann: match_arxiv_papers
  vector_rpc_exact: match_arxiv_papers_exact
  use_bm25_rpc: true
  bm25_rpc: match_arxiv_papers_bm25
  sync_table: arxiv_sync_status
  sync_success_value: success
  schema: public
subscriptions:
  schema_migration:
    stage: A
    diff_threshold_pct: 15
  keyword_recall_mode: or
  intent_profiles:
    - tag: agent
      description: 帮我查找Agent相关的论文，如search agent，code agent，general agent等
      enabled: true
      paper_sources:
        - arxiv
      keywords:
        - keyword: search agent
          keyword_cn: 搜索代理
          query: search agent papers
        - keyword: code agent
          keyword_cn: 代码代理
          query: code agent research
        - keyword: general agent
          keyword_cn: 通用代理
          query: general agent artificial intelligence
        - keyword: autonomous agent
          keyword_cn: 自主代理
          query: autonomous agent systems
        - keyword: agent framework
          keyword_cn: 代理框架
          query: agent framework design
        - keyword: multi agent system
          keyword_cn: 多代理系统
          query: multi agent system survey
      intent_queries:
        - query: latest advances in autonomous agents
          query_cn: 自主代理的最新进展
          enabled: true
          source: manual
          note: ''
        - query: how search agents work
          query_cn: 搜索代理如何工作
          enabled: true
          source: manual
          note: ''
        - query: comparison of code agents and general agents
          query_cn: 代码代理与通用代理的比较
          enabled: true
          source: manual
          note: ''
      updated_at: '2026-06-29T03:51:06.051Z'
    - tag: LLM
      description: 帮我查找LLM相关，包括LLM的架构，训练，推理，评测等
      enabled: true
      paper_sources:
        - arxiv
      keywords:
        - keyword: reinforcement learning
          keyword_cn: 强化学习
          query: R
        - keyword: large language model
          keyword_cn: 大型语言模型
          query: large language model architecture training inference evaluation
        - keyword: model training
          keyword_cn: 模型训练
          query: training large language models techniques
        - keyword: model inference
          keyword_cn: 模型推理
          query: inference optimization for large language models
        - keyword: model evaluation
          keyword_cn: 模型评测
          query: evaluation benchmarks for large language models
        - keyword: fine-tuning
          keyword_cn: 微调
          query: fine-tuning large language models
      intent_queries:
        - query: What are the different architectures of large language models?
          query_cn: 大型语言模型有哪些不同的架构？
          enabled: true
          source: manual
          note: ''
        - query: How to train a large language model effectively?
          query_cn: 如何有效地训练大型语言模型？
          enabled: true
          source: manual
          note: ''
        - query: Methods for efficient inference of large language models
          query_cn: 大型语言模型的高效推理方法
          enabled: true
          source: manual
          note: ''
        - query: Benchmarks for evaluating large language models
          query_cn: 大型语言模型的评测基准
          enabled: true
          source: manual
          note: ''
      updated_at: '2026-06-29T03:53:04.709Z'
    - tag: llm-reports
      description: 查找大模型技术报告，如DeepSeek、Qwen、Kimi、GLM等
      enabled: true
      paper_sources:
        - arxiv
      keywords:
        - keyword: technical report
          keyword_cn: 技术报告
          query: technical report of large language model
        - keyword: model architecture
          keyword_cn: 模型架构
          query: model architecture details in technical report
        - keyword: training details
          keyword_cn: 训练细节
          query: training details and methodology in technical report
        - keyword: evaluation results
          keyword_cn: 评估结果
          query: evaluation results and benchmarks in technical report
        - keyword: large language model
          keyword_cn: 大语言模型
          query: large language model technical report documentation
        - keyword: system card
          keyword_cn: 系统卡片
          query: system card and model specifications technical report
      intent_queries:
        - query: technical reports of large language models including DeepSeek, Qwen, Kimi, and GLM
          query_cn: 包括DeepSeek、Qwen、Kimi和GLM的大语言模型技术报告
          enabled: true
          source: manual
          note: ''
        - query: model architecture and training methodology for DeepSeek, Qwen, Kimi, GLM
          query_cn: DeepSeek、Qwen、Kimi、GLM的模型架构与训练方法
          enabled: true
          source: manual
          note: ''
      updated_at: '2026-06-29T03:54:07.380Z'
source_backends:
  arxiv:
    papers_table: arxiv_papers
    use_vector_rpc: true
    vector_rpc: match_arxiv_papers
    vector_rpc_exact: match_arxiv_papers_exact
    use_bm25_rpc: true
    bm25_rpc: match_arxiv_papers_bm25
    sync_table: arxiv_sync_status
    sync_success_value: success
    schema: public
    kind: supabase
    enabled: true
    url: https://lyucdwgefyfbmaiopjbk.supabase.co
    anon_key: sb_publishable_lX-oi64Uxyd7SIVv3_w2Uw_MTOojeKq
